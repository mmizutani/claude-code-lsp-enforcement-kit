# Lefthook configuration for claude-code-lsp-enforcement-kit
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    validate-marketplace-manifest:
      glob: "{.claude-plugin/marketplace.json,schemas/claude-plugin-marketplace-manifest.schema.json}"
      run: ./scripts/validate-marketplace-manifest.sh

    validate-plugin-manifest:
      glob: "{.claude-plugin/plugin.json,schemas/claude-plugin-manifest.schema.json}"
      run: ./scripts/validate-plugin-manifest.sh

    run-tests:
      glob: "{hooks/*.cjs,hooks/lib/*.cjs,tests/*.test.cjs,.claude-plugin/*.json,hooks/hooks.json,rules/*.md}"
      run: node --test 'tests/*.test.cjs'
