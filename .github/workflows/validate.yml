name: Validate Plugin

on:
  pull_request:
    branches:
      - main
    paths:
      - '.claude-plugin/**'
      - 'hooks/**'
      - 'rules/**'
      - 'schemas/**'
      - 'tests/**'
      - '.github/workflows/validate.yml'

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
      - name: Run tests
        run: node --test 'tests/*.test.cjs'

  validate-marketplace-manifest:
    name: Validate Marketplace manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate Marketplace manifest schema
        uses: dsanders11/json-schema-validate-action@79b2d95a446a0d786f7f244ae7764f8370ff3657 # v1.4.0
        with:
          schema: ./schemas/claude-plugin-marketplace-manifest.schema.json
          files: .claude-plugin/marketplace.json
          all-errors: true

  validate-plugin-manifest:
    name: Validate Plugin manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate Plugin manifest schema
        uses: dsanders11/json-schema-validate-action@79b2d95a446a0d786f7f244ae7764f8370ff3657 # v1.4.0
        with:
          schema: ./schemas/claude-plugin-manifest.schema.json
          files: .claude-plugin/plugin.json
          all-errors: true
